<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physical Wiring Diagram | WiFi Drone</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0c10;
            --card: #1f2833;
            --accent: #66fcf1;
            --wire-pwr: #ff4d4d;
            --wire-sig: #f9d71c;
            --wire-gnd: #ffffff;
            --text: #c5c6c7;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 1100px; }

        header {
            border-bottom: 1px solid #45a29e;
            padding-bottom: 20px;
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .diagram-canvas {
            background: #111;
            border-radius: 20px;
            padding: 40px;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
            border: 1px solid #333;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        /* Technical Label Styling */
        .tech-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            fill: var(--accent);
            text-transform: uppercase;
        }

        .legend {
            margin-top: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            background: var(--card);
            padding: 20px;
            border-radius: 10px;
        }

        .legend-item { display: flex; align-items: center; gap: 10px; font-size: 13px; }
        .line { width: 40px; height: 3px; border-radius: 2px; }

        .back-link {
            text-decoration: none;
            color: var(--accent);
            font-weight: bold;
            font-size: 0.9rem;
        }

        table {
            width: 100%;
            margin-top: 40px;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th { text-align: left; color: var(--accent); padding: 12px; border-bottom: 2px solid #45a29e; }
        td { padding: 12px; border-bottom: 1px solid #333; }

        @media (max-width: 768px) {
            body { padding: 10px; }
            svg { width: 100%; height: auto; }
        }
    </style>
</head>
